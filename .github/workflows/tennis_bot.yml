name: Tennis value bot (paper)

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min; GitHub cron has jitter, that's fine
  workflow_dispatch: {}

concurrency:
  group: tennis-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tennis-value-bot/requirements.txt

      - name: Install dependencies
        working-directory: tennis-value-bot
        run: pip install -r requirements.txt

      - name: Run one paper cycle
        working-directory: tennis-value-bot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python -m src.main --once

      - name: Commit ledger
        run: |
          git config user.name "tennis-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tennis-value-bot/data/ledger.db
          if git diff --cached --quiet; then
            echo "no ledger changes"; exit 0
          fi
          git commit -m "tennis bot: ledger update [skip ci]"
          for i in 1 2 3; do
            git push && break || git pull --rebase
          done
